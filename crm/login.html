<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign in</title>
    <link rel="stylesheet" href="/crm/assets/crm.css" />
  </head>
  <body class="auth-body">
    <main class="auth-card">
      <h1 id="auth-title">Sign in</h1>
      <p class="auth-sub" id="auth-sub">Enter your email and we'll send you a sign-in link.</p>

      <!-- Magic-link form (default) -->
      <form id="magic-form" class="auth-form">
        <input type="hidden" name="tenant" id="tenant" />
        <label>
          Email
          <input name="email" type="email" required autocomplete="email" placeholder="you@company.com" />
        </label>
        <button type="submit" id="magic-btn">Send sign-in link</button>
        <p id="magic-status" class="auth-status" hidden></p>
        <p id="magic-error" class="auth-error" hidden></p>
      </form>

      <!-- Password form (hidden, toggled by "Use password" link) -->
      <form id="password-form" class="auth-form" hidden>
        <input type="hidden" name="tenant" id="pw-tenant" />
        <label>
          Email
          <input name="email" type="email" required autocomplete="email" />
        </label>
        <label>
          Password
          <input name="password" type="password" required autocomplete="current-password" />
        </label>
        <button type="submit">Sign in with password</button>
        <p id="pw-error" class="auth-error" hidden></p>
      </form>

      <p class="auth-toggle">
        <a href="#" id="toggle-mode">Use password instead</a>
      </p>
    </main>
    <script src="/crm/assets/crm.js"></script>
    <script>
      CRM.initLogin();
    </script>
  </body>
</html>
