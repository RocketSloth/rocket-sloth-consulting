<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks | Rocket Sloth Consulting</title>
<meta name="description" content="Thanks for joining the Rocket Sloth Consulting early access list.">
<meta name="theme-color" content="#0b0d12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at top right, rgba(255, 122, 61, 0.12), transparent 32%),
    linear-gradient(180deg, #0b0d12 0%, #0f1420 100%);
  color: #d8deed;
  font-family: "Manrope", system-ui, sans-serif;
}

.card {
  width: min(640px, 100%);
  padding: 40px 32px;
  border-radius: 28px;
  border: 1px solid rgba(141, 164, 214, 0.16);
  background: rgba(16, 22, 34, 0.92);
  box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
}

.badge {
  display: inline-grid;
  place-items: center;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ff7a3d, #c85624);
  box-shadow: 0 0 26px rgba(255, 122, 61, 0.24);
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.06em;
}

h1 {
  margin: 18px 0 12px;
  font-family: "Instrument Serif", Georgia, serif;
  font-size: clamp(2.4rem, 6vw, 4rem);
  font-weight: 400;
  line-height: 0.98;
  letter-spacing: -0.04em;
}

p {
  margin: 0 0 12px;
  color: #a2abc2;
  line-height: 1.7;
}

a {
  display: inline-flex;
  margin-top: 14px;
  align-items: center;
  justify-content: center;
  min-height: 50px;
  padding: 0 20px;
  border-radius: 999px;
  background: #ff7a3d;
  color: #1d130e;
  text-decoration: none;
  font-weight: 800;
}
</style>
</head>
<body>
  <main class="card">
    <div class="badge" aria-hidden="true">RS</div>
    <h1>You're on the list.</h1>
    <p>Thanks for signing up for Rocket Sloth Consulting early access.</p>
    <p>You'll be first to hear about pilot openings, launch updates, and the AI readiness quiz.</p>
    <a href="/index.html">Back to the landing page</a>
  </main>
